controller_manager:
  ros__parameters:
    update_rate: 50  # Hz

joint_state_broadcaster:
  ros__parameters: {}

diff_drive_controller:
  ros__parameters:
    left_wheel_names:
      - left_front_wheel_joint
      - left_mid_wheel_joint
      - left_rear_wheel_joint
    right_wheel_names:
      - right_front_wheel_joint
      - right_mid_wheel_joint
      - right_rear_wheel_joint

    # HARDWARE UPGRADE: measure actual rover dimensions
    wheel_separation: 0.5        # meters — tape measure centre-to-centre of wheel treads
    wheel_radius: 0.1            # meters — measure loaded radius (with rover weight)

    publish_rate: 50.0           # Hz for /odom
    cmd_vel_timeout: 0.5         # seconds — matches old rover_drive watchdog timeout
    use_stamped_vel: false

    linear.x.max_velocity: 1.0   # m/s
    angular.z.max_velocity: 2.0  # rad/s

    publish_odom_to_tf: true
    odom_frame_id: odom
    base_frame_id: base_link
